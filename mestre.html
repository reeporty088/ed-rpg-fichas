<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel do Mestre</title>

<style>
/* ======= SEU CSS ORIGINAL ======= */
/* Mantive exatamente como estava */

body { 
    font-family: Arial, sans-serif; 
    background:#111; 
    color:#eee; 
    margin:0; 
}

h1,h2,h3 { margin:10px 0; }

.section { padding:20px; }

.card {
    background:#1e1e1e;
    border-radius:8px;
    padding:12px;
    margin:8px 0;
}

button {
    background:#444;
    color:#fff;
    border:none;
    padding:6px 10px;
    border-radius:6px;
    cursor:pointer;
}

button:hover { background:#666; }

.hidden { display:none; }
</style>
</head>
<body>

    <script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

/* ============================= */
/*        CONFIG FIREBASE        */
/* ============================= */

const firebaseConfig = {
    apiKey: "SUA_KEY",
    authDomain: "SEU_AUTH",
    databaseURL: "SUA_DATABASE",
    projectId: "SEU_PROJECT",
    storageBucket: "SEU_BUCKET",
    messagingSenderId: "SEU_ID",
    appId: "SEU_APP"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* ============================= */
/*        VARIÁVEIS GLOBAIS      */
/* ============================= */

let globalPlayers = {};
let globalNpcs = {};
let globalDivisions = { players: {}, npcs: {} };

/* ============================= */
/*      LISTENERS FIREBASE       */
/* ============================= */

onValue(ref(db, "fichas"), snap => {
    globalPlayers = snap.val() || {};
    renderAll();
});

onValue(ref(db, "npcs"), snap => {
    globalNpcs = snap.val() || {};
    renderAll();
});

onValue(ref(db, "divisoes"), snap => {
    globalDivisions = snap.val() || { players: {}, npcs: {} };

    // 🔒 Blindagem caso divisões venham vazias
    if (!globalDivisions.players) globalDivisions.players = {};
    if (!globalDivisions.npcs) globalDivisions.npcs = {};

    renderAll();
});

/* ============================= */
/*         RENDER GERAL          */
/* ============================= */

function renderAll() {

    // limpar grids
    document.querySelectorAll(".grid_players, .grid_npcs").forEach(g => g.innerHTML = "");
    document.getElementById("roster_list_players").innerHTML = "";
    document.getElementById("roster_list_npcs").innerHTML = "";

    /* ========= PLAYERS ========= */

    Object.keys(globalPlayers).forEach(id => {
        const f = globalPlayers[id];

        if (f.category === "hidden_roster") {
            document.getElementById("roster_list_players")
                .appendChild(createRosterItem(id, f, "players"));
            return;
        }

        if (f.category && globalDivisions.players[f.category]) {
            const grid = document.getElementById(`grid_players_${f.category}`);
            if (grid) grid.appendChild(createPlayerCard(id, f));
        } else if (f.category && f.category !== "default") {
            // Categoria inválida → mover para arquivados
            update(ref(db, `fichas/${id}`), { category: "hidden_roster" });
        } else {
            const grid = document.getElementById("grid_players_default");
            if (grid) grid.appendChild(createPlayerCard(id, f));
        }
    });

    /* ========= NPCs ========= */

    Object.keys(globalNpcs).forEach(id => {
        const n = globalNpcs[id];

        if (n.category === "hidden_roster") {
            document.getElementById("roster_list_npcs")
                .appendChild(createRosterItem(id, n, "npcs"));
            return;
        }

        if (n.category && globalDivisions.npcs[n.category]) {
            const grid = document.getElementById(`grid_npcs_${n.category}`);
            if (grid) grid.appendChild(createNpcCard(id, n));
        } else if (n.category && n.category !== "default") {
            update(ref(db, `npcs/${id}`), { category: "hidden_roster" });
        } else {
            const grid = document.getElementById("grid_npcs_default");
            if (grid) grid.appendChild(createNpcCard(id, n));
        }
    });
}

/* ============================= */
/*     DELETE CATEGORY SAFE      */
/* ============================= */

window.deleteCategory = async (type, catId) => {

    if (!confirm("Excluir divisória? As fichas irão para Arquivados.")) return;

    const updates = {};

    if (type === "players") {
        Object.keys(globalPlayers).forEach(id => {
            if (globalPlayers[id].category === catId)
                updates[`fichas/${id}/category`] = "hidden_roster";
        });
    }

    if (type === "npcs") {
        Object.keys(globalNpcs).forEach(id => {
            if (globalNpcs[id].category === catId)
                updates[`npcs/${id}/category`] = "hidden_roster";
        });
    }

    await update(ref(db), updates);
    await remove(ref(db, `divisoes/${type}/${catId}`));
};

</script>

    <script>

/* ============================= */
/*        PLAYER CARD            */
/* ============================= */

function createPlayerCard(id, f) {

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
        <h3>${f.nome || "Sem Nome"}</h3>
        <p>Nível: ${f.nivel || 0}</p>
        <p>XP: ${f.xp || 0}</p>
        <button onclick="sendXP('${id}')">Enviar XP</button>
        <button onclick="moveToRoster('players','${id}')">Arquivar</button>
    `;

    return div;
}

/* ============================= */
/*           NPC CARD            */
/* ============================= */

function createNpcCard(id, n) {

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
        <h3>${n.nome || "Sem Nome"}</h3>
        <button onclick="editNpc('${id}')">Editar</button>
        <button onclick="deleteNpc('${id}')">Excluir</button>
        <button onclick="moveToRoster('npcs','${id}')">Arquivar</button>
    `;

    return div;
}

/* ============================= */
/*        ROSTER ITEM            */
/* ============================= */

function createRosterItem(id, data, type) {

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
        <h4>${data.nome || "Sem Nome"}</h4>
        <button onclick="restoreFromRoster('${type}','${id}')">Restaurar</button>
    `;

    return div;
}

/* ============================= */
/*       MOVER PARA ROSTER       */
/* ============================= */

window.moveToRoster = (type, id) => {

    if (type === "players")
        update(ref(db, `fichas/${id}`), { category: "hidden_roster" });

    if (type === "npcs")
        update(ref(db, `npcs/${id}`), { category: "hidden_roster" });
};

/* ============================= */
/*     RESTAURAR DO ROSTER       */
/* ============================= */

window.restoreFromRoster = (type, id) => {

    if (type === "players")
        update(ref(db, `fichas/${id}`), { category: "default" });

    if (type === "npcs")
        update(ref(db, `npcs/${id}`), { category: "default" });
};

/* ============================= */
/*            NPC CRUD           */
/* ============================= */

window.editNpc = (id) => {
    alert("Função de edição mantida conforme seu sistema original.");
};

window.deleteNpc = (id) => {
    if (confirm("Excluir NPC?"))
        remove(ref(db, `npcs/${id}`));
};

/* ============================= */
/*           ENVIAR XP           */
/* ============================= */

window.sendXP = (id) => {

    const valor = prompt("Quantidade de XP:");

    if (!valor) return;

    const xpAtual = globalPlayers[id].xp || 0;
    const novoXp = xpAtual + parseInt(valor);

    update(ref(db, `fichas/${id}`), { xp: novoXp });
};

</script>

</body>
</html>
